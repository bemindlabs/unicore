version: "3.8"

services:
  # ─── Infrastructure ───────────────────────────────────────────────
  unicore-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: unicore
      POSTGRES_PASSWORD: password
      POSTGRES_DB: unicore
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unicore"]
      interval: 5s
      timeout: 3s
      retries: 5

  unicore-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  unicore-vectordb:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - vectordb_data:/qdrant/storage

  unicore-zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    profiles: [workflows]

  unicore-kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - unicore-zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: unicore-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://unicore-kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    profiles: [workflows]
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Backend Services ─────────────────────────────────────────────
  unicore-api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://unicore:password@unicore-postgres:5432/unicore?schema=public
      REDIS_URL: redis://unicore-redis:6379
      JWT_SECRET: unicore-local-dev-secret-key-minimum-32-chars
      NODE_ENV: development
      PORT: "4000"
      BOOTSTRAP_SECRET: unicore-bootstrap-secret-local
      ERP_SERVICE_HOST: unicore-erp
      ERP_SERVICE_PORT: "4100"
      AI_ENGINE_SERVICE_HOST: unicore-ai-engine
      AI_ENGINE_SERVICE_PORT: "4200"
      RAG_SERVICE_HOST: unicore-rag
      RAG_SERVICE_PORT: "4300"
      BOOTSTRAP_SERVICE_HOST: unicore-bootstrap
      BOOTSTRAP_SERVICE_PORT: "4500"
      OPENCLAW_SERVICE_HOST: unicore-openclaw-gateway
      OPENCLAW_SERVICE_PORT: "18790"
    depends_on:
      unicore-postgres:
        condition: service_healthy
      unicore-redis:
        condition: service_healthy
    profiles: [apps]

  unicore-erp:
    build:
      context: .
      dockerfile: services/erp/Dockerfile
    ports:
      - "4100:4100"
    environment:
      DATABASE_URL: postgresql://unicore:password@unicore-postgres:5432/unicore?schema=public
      REDIS_URL: redis://unicore-redis:6379
      PORT: "4100"
      KAFKA_BROKERS: unicore-kafka:9092
    depends_on:
      unicore-postgres:
        condition: service_healthy
    profiles: [apps]

  unicore-ai-engine:
    build:
      context: .
      dockerfile: services/ai-engine/Dockerfile
    ports:
      - "4200:4200"
    environment:
      PORT: "4200"
      REDIS_URL: redis://unicore-redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      unicore-redis:
        condition: service_healthy
    profiles: [apps]

  unicore-rag:
    build:
      context: .
      dockerfile: services/rag/Dockerfile
    ports:
      - "4300:4300"
    environment:
      PORT: "4300"
      QDRANT_URL: http://unicore-vectordb:6333
      REDIS_URL: redis://unicore-redis:6379
    depends_on:
      unicore-vectordb:
        condition: service_started
      unicore-redis:
        condition: service_healthy
    profiles: [apps]

  unicore-bootstrap:
    build:
      context: .
      dockerfile: services/bootstrap/Dockerfile
    ports:
      - "4500:4500"
    environment:
      DATABASE_URL: postgresql://unicore:password@unicore-postgres:5432/unicore?schema=public
      PORT: "4500"
      BOOTSTRAP_SECRET: unicore-bootstrap-secret-local
      API_GATEWAY_URL: http://unicore-api-gateway:4000
      LICENSE_API_URL: http://unicore-license-api:4600
      LICENSE_ADMIN_SECRET: unicore-license-admin-secret-local
    depends_on:
      unicore-postgres:
        condition: service_healthy
      unicore-api-gateway:
        condition: service_started
      unicore-license-api:
        condition: service_started
    profiles: [apps]

  unicore-openclaw-gateway:
    build:
      context: .
      dockerfile: services/openclaw-gateway/Dockerfile
    ports:
      - "18790:18790"
    environment:
      PORT: "18789"
      HTTP_PORT: "18790"
      REDIS_URL: redis://unicore-redis:6379
    depends_on:
      unicore-redis:
        condition: service_healthy
    profiles: [apps]

  unicore-workflow:
    build:
      context: .
      dockerfile: services/workflow/Dockerfile
    environment:
      KAFKA_BROKERS: unicore-kafka:9092
      REDIS_URL: redis://unicore-redis:6379
      ERP_SERVICE_URL: http://unicore-erp:4100
      OPENCLAW_GATEWAY_URL: ws://unicore-openclaw-gateway:18789
    depends_on:
      unicore-kafka:
        condition: service_healthy
    profiles: [workflows]

  # ─── License Server ──────────────────────────────────────────────
  unicore-license-api:
    build:
      context: ../unicore-license
      dockerfile: services/license-api/Dockerfile
    ports:
      - "4600:4600"
    environment:
      DATABASE_URL: postgresql://unicore:password@unicore-license-db:5432/unicore_license?schema=public
      REDIS_URL: redis://unicore-license-redis:6379
      ADMIN_SECRET: unicore-license-admin-secret-local
      PORT: "4600"
    profiles: [apps]

  unicore-license-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: unicore
      POSTGRES_PASSWORD: password
      POSTGRES_DB: unicore_license
    volumes:
      - license_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unicore -d unicore_license"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles: [apps]

  unicore-license-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - license_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles: [apps]

  # ─── Frontend Apps ────────────────────────────────────────────────
  unicore-dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://76.13.188.164:4000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://76.13.188.164:4000
    depends_on:
      - unicore-api-gateway
    profiles: [apps]

  unicore-onboarding:
    build:
      context: .
      dockerfile: apps/onboarding/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://76.13.188.164:4000
        NEXT_PUBLIC_BOOTSTRAP_URL: http://76.13.188.164:4500
        NEXT_PUBLIC_BOOTSTRAP_SECRET: unicore-bootstrap-secret-local
    ports:
      - "3100:3100"
    environment:
      NEXT_PUBLIC_API_URL: http://76.13.188.164:4000
      NEXT_PUBLIC_BOOTSTRAP_URL: http://76.13.188.164:4500
      NEXT_PUBLIC_BOOTSTRAP_SECRET: unicore-bootstrap-secret-local
    depends_on:
      - unicore-api-gateway
    profiles: [apps]

volumes:
  postgres_data:
  redis_data:
  vectordb_data:
  license_postgres_data:
  license_redis_data:
