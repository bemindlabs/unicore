version: "3.8"

services:
  # Infrastructure (always on)
  unicore-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: unicore
      POSTGRES_PASSWORD: password
      POSTGRES_DB: unicore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  unicore-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  unicore-vectordb:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - vectordb_data:/qdrant/storage

  unicore-zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    profiles: [workflows]

  unicore-kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - unicore-zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: unicore-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    profiles: [workflows]

volumes:
  postgres_data:
  redis_data:
  vectordb_data:
