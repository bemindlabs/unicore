# ============================================================================
# UniCore Community Edition
# ============================================================================
# Open-source core platform — includes all community services, infrastructure,
# and the license server integration.
#
# Usage:
#   docker compose up -d                          # infrastructure only
#   docker compose --profile apps up -d           # + backend & frontend
#   docker compose --profile apps --profile workflows up -d  # + Kafka workflows
# ============================================================================

services:

  # ─── Infrastructure ────────────────────────────────────────────────────────

  unicore-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-unicore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-unicore}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unicore"]
      interval: 5s
      timeout: 3s
      retries: 5

  unicore-redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  unicore-vectordb:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - vectordb_data:/qdrant/storage

  unicore-zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    profiles: [workflows]

  unicore-kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - unicore-zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: unicore-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://unicore-kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    profiles: [workflows]
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Backend Services (Community) ──────────────────────────────────────────

  unicore-api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "4000:4000"
    environment:
      UNICORE_EDITION: community
      DATABASE_URL: postgresql://${POSTGRES_USER:-unicore}:${POSTGRES_PASSWORD:-password}@unicore-postgres:5432/${POSTGRES_DB:-unicore}?schema=public
      REDIS_URL: redis://unicore-redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars}
      NODE_ENV: development
      PORT: "4000"
      BOOTSTRAP_SECRET: ${BOOTSTRAP_SECRET:-change-me-bootstrap-secret}
      ERP_SERVICE_HOST: unicore-erp
      ERP_SERVICE_PORT: "4100"
      AI_ENGINE_SERVICE_HOST: unicore-ai-engine
      AI_ENGINE_SERVICE_PORT: "4200"
      RAG_SERVICE_HOST: unicore-rag
      RAG_SERVICE_PORT: "4300"
      BOOTSTRAP_SERVICE_HOST: unicore-bootstrap
      BOOTSTRAP_SERVICE_PORT: "4500"
      OPENCLAW_SERVICE_HOST: unicore-openclaw-gateway
      OPENCLAW_SERVICE_PORT: "18790"
      WORKFLOW_SERVICE_HOST: unicore-workflow
      WORKFLOW_SERVICE_PORT: "4400"
    depends_on:
      unicore-postgres:
        condition: service_healthy
      unicore-redis:
        condition: service_healthy
    profiles: [apps]

  unicore-erp:
    build:
      context: .
      dockerfile: services/erp/Dockerfile
    ports:
      - "4100:4100"
    environment:
      UNICORE_EDITION: community
      DATABASE_URL: postgresql://${POSTGRES_USER:-unicore}:${POSTGRES_PASSWORD:-password}@unicore-postgres:5432/${POSTGRES_DB_ERP:-unicore_erp}?schema=public
      REDIS_URL: redis://unicore-redis:6379
      PORT: "4100"
      KAFKA_BROKERS: unicore-kafka:9092
    depends_on:
      unicore-postgres:
        condition: service_healthy
    profiles: [apps]

  unicore-ai-engine:
    build:
      context: .
      dockerfile: services/ai-engine/Dockerfile
    ports:
      - "4200:4200"
    environment:
      UNICORE_EDITION: community
      PORT: "4200"
      REDIS_URL: redis://unicore-redis:6379
    depends_on:
      unicore-redis:
        condition: service_healthy
    profiles: [apps]

  unicore-rag:
    build:
      context: .
      dockerfile: services/rag/Dockerfile
    ports:
      - "4300:4300"
    environment:
      UNICORE_EDITION: community
      PORT: "4300"
      QDRANT_URL: http://unicore-vectordb:6333
      REDIS_URL: redis://unicore-redis:6379
    depends_on:
      unicore-vectordb:
        condition: service_started
      unicore-redis:
        condition: service_healthy
    profiles: [apps]

  unicore-bootstrap:
    build:
      context: .
      dockerfile: services/bootstrap/Dockerfile
    ports:
      - "4500:4500"
    environment:
      UNICORE_EDITION: community
      DATABASE_URL: postgresql://${POSTGRES_USER:-unicore}:${POSTGRES_PASSWORD:-password}@unicore-postgres:5432/${POSTGRES_DB:-unicore}?schema=public
      PORT: "4500"
      BOOTSTRAP_SECRET: ${BOOTSTRAP_SECRET:-change-me-bootstrap-secret}
      API_GATEWAY_URL: http://unicore-api-gateway:4000
      LICENSE_API_URL: http://unicore-license-api:4600
      LICENSE_ADMIN_SECRET: ${LICENSE_ADMIN_SECRET:-change-me-license-secret}
    depends_on:
      unicore-postgres:
        condition: service_healthy
      unicore-api-gateway:
        condition: service_started
      unicore-license-api:
        condition: service_started
    profiles: [apps]

  unicore-openclaw-gateway:
    build:
      context: .
      dockerfile: services/openclaw-gateway/Dockerfile
    ports:
      - "18790:18790"
    environment:
      UNICORE_EDITION: community
      PORT: "18789"
      HTTP_PORT: "18790"
      REDIS_URL: redis://unicore-redis:6379
      AI_ENGINE_URL: http://unicore-ai-engine:4200
      ERP_SERVICE_URL: http://unicore-erp:4100
    depends_on:
      unicore-redis:
        condition: service_healthy
    profiles: [apps]

  unicore-workflow:
    build:
      context: .
      dockerfile: services/workflow/Dockerfile
    environment:
      UNICORE_EDITION: community
      PORT: "4400"
      KAFKA_BROKERS: unicore-kafka:9092
      REDIS_URL: redis://unicore-redis:6379
      ERP_SERVICE_URL: http://unicore-erp:4100
      OPENCLAW_GATEWAY_URL: ws://unicore-openclaw-gateway:18789
    depends_on:
      unicore-kafka:
        condition: service_healthy
    profiles: [workflows]

  # ─── License Server ────────────────────────────────────────────────────────

  unicore-license-api:
    build:
      context: ../unicore-license
      dockerfile: services/license-api/Dockerfile
    ports:
      - "4600:4600"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-unicore}:${POSTGRES_PASSWORD:-password}@unicore-license-db:5432/${POSTGRES_DB_LICENSE:-unicore_license}?schema=public
      REDIS_URL: redis://unicore-license-redis:6379
      ADMIN_SECRET: ${LICENSE_ADMIN_SECRET:-change-me-license-secret}
      PORT: "4600"
    profiles: [apps]

  unicore-license-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-unicore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB_LICENSE:-unicore_license}
    volumes:
      - license_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unicore -d unicore_license"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles: [apps]

  unicore-license-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - license_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles: [apps]

  # ─── Nginx Reverse Proxy ───────────────────────────────────────────────────

  unicore-nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - unicore-dashboard
      - unicore-api-gateway
      - unicore-openclaw-gateway
    networks:
      - default
      - nginx-proxy
    profiles: [apps]

  # ─── Frontend Apps (Community) ─────────────────────────────────────────────

  unicore-dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
        NEXT_PUBLIC_EDITION: community
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:18789}
    ports:
      - "3000:3000"
    environment:
      UNICORE_EDITION: community
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NEXT_PUBLIC_EDITION: community
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:18789}
    depends_on:
      - unicore-api-gateway
    profiles: [apps]

# ─── Volumes ─────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  vectordb_data:
  license_postgres_data:
  license_redis_data:

# ─── Networks ────────────────────────────────────────────────────────────────

networks:
  nginx-proxy:
    external: true
