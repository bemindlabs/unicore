name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dashboard
            context: .
            dockerfile: apps/dashboard/Dockerfile
            image: bemindlab/dashboard
            repo: unicore
          - name: api-gateway
            context: .
            dockerfile: services/api-gateway/Dockerfile
            image: bemindlab/api-gateway
            repo: unicore
          - name: erp
            context: .
            dockerfile: services/erp/Dockerfile
            image: bemindlab/erp
            repo: unicore
          - name: ai-engine
            context: .
            dockerfile: services/ai-engine/Dockerfile
            image: bemindlab/ai-engine
            repo: unicore
          - name: rag
            context: .
            dockerfile: services/rag/Dockerfile
            image: bemindlab/rag
            repo: unicore
          - name: bootstrap
            context: .
            dockerfile: services/bootstrap/Dockerfile
            image: bemindlab/bootstrap
            repo: unicore
          - name: openclaw-gateway
            context: .
            dockerfile: services/openclaw-gateway/Dockerfile
            image: bemindlab/openclaw-gateway
            repo: unicore
          - name: workflow
            context: .
            dockerfile: services/workflow/Dockerfile
            image: bemindlab/workflow
            repo: unicore
          - name: license-api
            context: unicore-license
            dockerfile: unicore-license/services/license-api/Dockerfile
            image: bemindlab/license-api
            repo: license

    steps:
      - name: Checkout unicore
        uses: actions/checkout@v4

      - name: Checkout unicore-license
        if: matrix.repo == 'license'
        uses: actions/checkout@v4
        with:
          repository: bemindlabs/unicore-license
          path: unicore-license
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
