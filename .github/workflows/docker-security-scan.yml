name: Docker Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'  # Weekly, every Monday at 03:00 UTC

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  scan:
    name: Scan ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api-gateway
            dockerfile: services/api-gateway/Dockerfile
            context: .
          - name: erp
            dockerfile: services/erp/Dockerfile
            context: .
          - name: ai-engine
            dockerfile: services/ai-engine/Dockerfile
            context: .
          - name: rag
            dockerfile: services/rag/Dockerfile
            context: .
          - name: bootstrap
            dockerfile: services/bootstrap/Dockerfile
            context: .
          - name: openclaw-gateway
            dockerfile: services/openclaw-gateway/Dockerfile
            context: .
          - name: workflow
            dockerfile: services/workflow/Dockerfile
            context: .
          - name: dashboard
            dockerfile: apps/dashboard/Dockerfile
            context: .
          - name: license-api
            dockerfile: ../unicore-license/services/license-api/Dockerfile
            context: ../unicore-license

    steps:
      - name: Checkout unicore
        uses: actions/checkout@v4
        with:
          path: unicore

      - name: Checkout unicore-license (for license-api)
        if: matrix.service.name == 'license-api'
        uses: actions/checkout@v4
        with:
          repository: bemindlabs/unicore-license
          path: unicore-license
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: unicore/${{ matrix.service.context }}
          file: unicore/${{ matrix.service.dockerfile }}
          push: false
          load: true
          tags: unicore/${{ matrix.service.name }}:scan
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: unicore/${{ matrix.service.name }}:scan
          format: table
          exit-code: '1'
          ignore-unfixed: false
          vuln-type: os,library
          severity: HIGH,CRITICAL
          trivyignore-file: unicore/.trivyignore

      - name: Generate Trivy SARIF report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: unicore/${{ matrix.service.name }}:scan
          format: sarif
          output: trivy-${{ matrix.service.name }}.sarif
          vuln-type: os,library
          severity: HIGH,CRITICAL
          trivyignore-file: unicore/.trivyignore

      - name: Generate SBOM (CycloneDX)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: unicore/${{ matrix.service.name }}:scan
          format: cyclonedx
          output: sbom-${{ matrix.service.name }}.cdx.json
          vuln-type: os,library

      - name: Generate JSON report (for PR summary)
        if: github.event_name == 'pull_request' && always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: unicore/${{ matrix.service.name }}:scan
          format: json
          output: trivy-${{ matrix.service.name }}.json
          vuln-type: os,library
          severity: HIGH,CRITICAL
          trivyignore-file: unicore/.trivyignore

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-${{ matrix.service.name }}
          path: |
            trivy-${{ matrix.service.name }}.sarif
            sbom-${{ matrix.service.name }}.cdx.json
          retention-days: 30

      - name: Upload SARIF to GitHub Security tab
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service.name }}.sarif
          category: trivy-${{ matrix.service.name }}

      - name: Save PR summary data
        if: github.event_name == 'pull_request' && always()
        run: |
          echo "SERVICE=${{ matrix.service.name }}" >> pr-summary-${{ matrix.service.name }}.env
          if [ -f trivy-${{ matrix.service.name }}.json ]; then
            HIGH=$(cat trivy-${{ matrix.service.name }}.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          results = data.get('Results', [])
          vulns = [v for r in results for v in r.get('Vulnerabilities', []) or []]
          print(sum(1 for v in vulns if v.get('Severity') == 'HIGH'))
          " 2>/dev/null || echo 0)
            CRITICAL=$(cat trivy-${{ matrix.service.name }}.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          results = data.get('Results', [])
          vulns = [v for r in results for v in r.get('Vulnerabilities', []) or []]
          print(sum(1 for v in vulns if v.get('Severity') == 'CRITICAL'))
          " 2>/dev/null || echo 0)
            echo "HIGH=$HIGH" >> pr-summary-${{ matrix.service.name }}.env
            echo "CRITICAL=$CRITICAL" >> pr-summary-${{ matrix.service.name }}.env
          fi

      - name: Upload PR summary data
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-summary-${{ matrix.service.name }}
          path: pr-summary-${{ matrix.service.name }}.env
          retention-days: 1

  pr-comment:
    name: Post PR Summary
    runs-on: ubuntu-latest
    needs: scan
    if: github.event_name == 'pull_request' && always()
    steps:
      - name: Download all PR summary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pr-summary-*
          merge-multiple: true

      - name: Build and post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const services = [
              'api-gateway', 'erp', 'ai-engine', 'rag', 'bootstrap',
              'openclaw-gateway', 'workflow', 'dashboard', 'license-api'
            ];

            let rows = '';
            let totalHigh = 0;
            let totalCritical = 0;

            for (const svc of services) {
              const file = `pr-summary-${svc}.env`;
              let high = 'N/A', critical = 'N/A';
              if (fs.existsSync(file)) {
                const lines = fs.readFileSync(file, 'utf8').split('\n');
                const h = lines.find(l => l.startsWith('HIGH='));
                const c = lines.find(l => l.startsWith('CRITICAL='));
                if (h) { high = h.split('=')[1]; totalHigh += parseInt(high) || 0; }
                if (c) { critical = c.split('=')[1]; totalCritical += parseInt(critical) || 0; }
              }
              const critIcon = parseInt(critical) > 0 ? '🔴' : parseInt(high) > 0 ? '🟠' : '🟢';
              rows += `| ${critIcon} \`${svc}\` | ${critical} | ${high} |\n`;
            }

            const statusIcon = totalCritical > 0 ? '🔴 Vulnerabilities Found' : totalHigh > 0 ? '🟠 Warnings' : '✅ All Clear';
            const body = [
              `## 🔒 Docker Security Scan Results`,
              ``,
              `**Status:** ${statusIcon}`,
              `**Total:** ${totalCritical} critical, ${totalHigh} high`,
              ``,
              `| Service | Critical | High |`,
              `|---------|----------|------|`,
              rows.trim(),
              ``,
              `> Scan artifacts (SARIF + SBOM) are available in the [Actions run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).`,
              ``,
              `_Powered by [Trivy](https://github.com/aquasecurity/trivy)_`
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('🔒 Docker Security Scan Results'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
