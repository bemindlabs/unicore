name: Docker PR Build

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dashboard
            context: .
            dockerfile: apps/dashboard/Dockerfile
            image: bemindlab/dashboard
            repo: unicore
            healthcheck: node --version
          - name: api-gateway
            context: .
            dockerfile: services/api-gateway/Dockerfile
            image: bemindlab/api-gateway
            repo: unicore
            healthcheck: node --version
          - name: erp
            context: .
            dockerfile: services/erp/Dockerfile
            image: bemindlab/erp
            repo: unicore
            healthcheck: node --version
          - name: ai-engine
            context: .
            dockerfile: services/ai-engine/Dockerfile
            image: bemindlab/ai-engine
            repo: unicore
            healthcheck: node --version
          - name: rag
            context: .
            dockerfile: services/rag/Dockerfile
            image: bemindlab/rag
            repo: unicore
            healthcheck: node --version
          - name: bootstrap
            context: .
            dockerfile: services/bootstrap/Dockerfile
            image: bemindlab/bootstrap
            repo: unicore
            healthcheck: node --version
          - name: openclaw-gateway
            context: .
            dockerfile: services/openclaw-gateway/Dockerfile
            image: bemindlab/openclaw-gateway
            repo: unicore
            healthcheck: node --version
          - name: workflow
            context: .
            dockerfile: services/workflow/Dockerfile
            image: bemindlab/workflow
            repo: unicore
            healthcheck: node --version
          - name: license-api
            context: unicore-license
            dockerfile: unicore-license/services/license-api/Dockerfile
            image: bemindlab/license-api
            repo: license
            healthcheck: node --version

    steps:
      - name: Checkout unicore
        uses: actions/checkout@v4

      - name: Checkout unicore-license
        if: matrix.repo == 'license'
        uses: actions/checkout@v4
        with:
          repository: bemindlabs/unicore-license
          path: unicore-license
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ matrix.image }}:pr-${{ github.event.pull_request.number }}
          build-args: |
            VERSION=0.0.0-pr.${{ github.event.pull_request.number }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Health check
        run: |
          docker run --rm \
            "${{ matrix.image }}:pr-${{ github.event.pull_request.number }}" \
            ${{ matrix.healthcheck }}
          echo "Health check passed for ${{ matrix.name }}"
