server {
    listen 80;
    server_name unicore.bemind.tech;

    # Docker DNS resolver — re-resolves on every request (no stale IPs)
    resolver 127.0.0.11 valid=10s ipv6=off;

    set $dashboard http://unicore-dashboard:3000;
    set $api      http://unicore-api-gateway:4000;
    set $ws       http://unicore-openclaw-gateway:18789;
    set $dlc      http://unicore-dlc-gateway:19790;
    set $dlcws    http://unicore-dlc-gateway:19789;

    # API endpoints — /api/* → API gateway
    location /api/ {
        proxy_pass $api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints — /auth/* → API gateway
    location /auth/ {
        proxy_pass $api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhooks — /webhooks/* → API gateway
    location /webhooks/ {
        proxy_pass $api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (OpenClaw) — /ws → openclaw:18789/
    location /ws {
        rewrite ^/ws(.*)$ /$1 break;
        proxy_pass $ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # DLC API — /dlc/* → dlc-gateway:19790
    location /dlc/ {
        proxy_pass $dlc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # DLC WebSocket — /dlc-ws → dlc-gateway:19789
    location /dlc-ws {
        rewrite ^/dlc-ws(.*)$ /$1 break;
        proxy_pass $dlcws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Terminal WebSocket — /terminal → api-gateway:4001/terminal
    location /terminal {
        set $terminal http://unicore-api-gateway:4001;
        proxy_pass $terminal;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Web SSH Proxy — /ssh/ → sshwifty:8182
    set $sshproxy http://unicore-ssh-proxy:8182;

    location /ssh/ {
        rewrite ^/ssh/(.*)$ /$1 break;
        proxy_pass $sshproxy;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Everything else → Dashboard
    location / {
        proxy_pass $dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
