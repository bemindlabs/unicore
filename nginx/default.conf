# ─── Rate limiting zones (SEC-M2) ────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

# ─── unicore.bemind.tech → Public website (unicore-platform) ────────────────
server {
    listen 80;
    server_name unicore.bemind.tech;

    # SEC-M3: Body size and timeout limits
    client_max_body_size 10M;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    resolver 127.0.0.11 valid=10s ipv6=off;

    set $platform http://unicore-platform:3100;

    location / {
        proxy_pass $platform;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── labs.bemind.tech → Bemind Technology (Production, isolated stack) ────
server {
    listen 80;
    server_name labs.bemind.tech;

    # SEC-M3: Body size and timeout limits
    client_max_body_size 10M;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Docker DNS resolver — re-resolves on every request (no stale IPs)
    resolver 127.0.0.11 valid=10s ipv6=off;

    set $dashboard http://labs-dashboard:3000;
    set $api      http://labs-api-gateway:4000;
    set $ws       http://labs-openclaw-gateway:18789;
    set $dlc      http://ai-dlc-gateway:19800;
    set $dlcws    http://ai-dlc-gateway:19801;
    set $geek_api http://ai-dlc-geek:18910;
    set $geek_ws  http://ai-dlc-geek:18911;

    # API endpoints — /api/* → API gateway
    location /api/ {
        limit_req zone=api burst=60 nodelay;
        proxy_pass $api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints — /auth/* → API gateway
    location /auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass $api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhooks — /webhooks/* → API gateway
    location /webhooks/ {
        proxy_pass $api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (OpenClaw) — /ws → openclaw:18789/
    location /ws {
        rewrite ^/ws(.*)$ /$1 break;
        proxy_pass $ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 86400;
    }

    # DLC API — /dlc/* → ai-dlc-gateway:19800
    location /dlc/ {
        proxy_pass $dlc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # DLC WebSocket — /dlc-ws → ai-dlc-gateway:19801
    location /dlc-ws {
        rewrite ^/dlc-ws(.*)$ /$1 break;
        proxy_pass $dlcws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Geek API — /geek/* → ai-dlc-geek:18910
    location /geek/ {
        proxy_pass $geek_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Geek Multiplayer WebSocket — /geek-ws → ai-dlc-geek:18911
    location /geek-ws {
        rewrite ^/geek-ws(.*)$ /$1 break;
        proxy_pass $geek_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Terminal WebSocket — /terminal → api-gateway:4001/terminal
    location /terminal {
        set $terminal http://unicore-api-gateway:4001;
        proxy_pass $terminal;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Web SSH Proxy — /ssh/ → sshwifty:8182
    set $sshproxy http://unicore-ssh-proxy:8182;

    location /ssh/ {
        rewrite ^/ssh/(.*)$ /$1 break;
        proxy_pass $sshproxy;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Portal — Geek CLI Portal — /portal/geek/* → portal-geek:3200
    set $portal_geek_labs http://unicore-portal-geek:3200;

    location /portal/geek {
        proxy_pass $portal_geek_labs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Portal — AI-DLC Portal — /portal/ai-dlc/* → portal-ai-dlc:3300
    set $portal_dlc_labs http://unicore-portal-ai-dlc:3300;

    location /portal/ai-dlc {
        proxy_pass $portal_dlc_labs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Everything else → Dashboard
    location / {
        proxy_pass $dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

