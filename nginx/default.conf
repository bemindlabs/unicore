server {
    listen 80;
    server_name unicore.bemind.tech;

    # Docker DNS resolver (re-resolves on every request — no stale IPs)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API endpoints — all /api/v1/* and /api/proxy/* go to API gateway
    location /api/ {
        set $api_upstream http://unicore-api-gateway:4000;
        proxy_pass $api_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints — always API gateway
    location /auth/ {
        set $api_upstream http://unicore-api-gateway:4000;
        proxy_pass $api_upstream/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhooks — always API gateway
    location /webhooks/ {
        set $api_upstream http://unicore-api-gateway:4000;
        proxy_pass $api_upstream/webhooks/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (OpenClaw) — proxy to WS server on port 18789
    location /ws {
        set $ws_upstream http://unicore-openclaw-gateway:18789;
        proxy_pass $ws_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Everything else → Dashboard
    location / {
        set $dashboard_upstream http://unicore-dashboard:3000;
        proxy_pass $dashboard_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
